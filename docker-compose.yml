services:

  chatbot:
    build: .
    container_name: op-chatbot
    restart: unless-stopped
    ports:
      - "3050:3001"
    env_file:
      - .env
    # Allows the container to reach PostgreSQL installed directly on the VPS host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatbot-net
    volumes:
      - avatars:/app/uploads/avatars
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  avatars:

networks:
  chatbot-net:
    driver: bridge
