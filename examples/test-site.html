<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site de Teste — op-chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      text-align: center;
    }
    h1  { font-size: 28px; margin-bottom: 12px; color: #111; }
    p   { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 8px; }
    pre {
      margin-top: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 13px;
      text-align: left;
      color: #334155;
      line-height: 1.7;
    }
    .step { font-weight: 700; color: #25D366; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧪 Site de Teste</h1>
    <p>Esta página testa o widget do <strong>op-chatbot</strong> localmente.</p>
    <p>O botão do chat aparecerá no <strong>canto inferior direito</strong>.</p>
    <pre>
<span class="step">1.</span> npm run dev
<span class="step">2.</span> Painel admin → Novo cliente → Domínio: localhost:3001
<span class="step">3.</span> Copie o token gerado e substitua SEU_TOKEN_AQUI abaixo
<span class="step">4.</span> Acesse http://localhost:3001/test.html
    </pre>
  </div>

  <script
    src="http://localhost:3001/widget.js"
    data-token="chatbot_b4b4b9bc06deeaf345051c47ea8e4cbd6c9d23dc247eaeaf"
    defer
  ></script>
</body>
</html>
